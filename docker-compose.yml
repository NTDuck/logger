version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: logger-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logger}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-logger}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_server:
    build:
      context: .
      target: api_server
    container_name: logger-api-server
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/logger}
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  main_worker:
    build:
      context: .
      target: main_worker
    container_name: logger-main-worker
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/logger}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  ws_server:
    build:
      context: .
      target: ws_server
    container_name: logger-ws-server
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/logger}
      - PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  alert_dispatcher:
    build:
      context: .
      target: alert_dispatcher
    container_name: logger-alert-dispatcher
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      redis:
        condition: service_healthy

  ai_worker:
    build:
      context: .
      target: ai_worker
    container_name: logger-ai-worker
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/logger}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  svelte_ui:
    build:
      context: ./frontend
    container_name: logger-svelte-ui
    ports:
      - "80:80"
    depends_on:
      api_server:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: logger-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb-data:
  redis-data:
  grafana-data:
