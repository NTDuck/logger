services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - 9092:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 3s
      retries: 5

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    volumes:
      - ./init-topics.sh:/init-topics.sh
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    environment:
      - REDPANDA_BROKERS=redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - 8123:8123
      - 9000:9000
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  logger-edge:
    build: .
    command: ["--role", "edge"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
    ports:
      - 8080:8080
    depends_on:
      redpanda-init:
        condition: service_completed_successfully

  logger-normalization:
    build: .
    command: ["--role", "normalization"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      redpanda-init:
        condition: service_completed_successfully

  logger-db-writer:
    build: .
    command: ["--role", "db-writer"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - CLICKHOUSE_URL=http://clickhouse:8123
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy

  logger-ai-consumer:
    build: .
    command: ["--role", "ai-consumer"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      redpanda-init:
        condition: service_completed_successfully

  logger-alert-consumer:
    build: .
    command: ["--role", "alert-consumer"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - REDIS_URL=redis://redis:6379/
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  logger-ws-server:
    build: .
    command: ["--role", "ws-server"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
    ports:
      - 8081:8081
    depends_on:
      redpanda-init:
        condition: service_completed_successfully

  logger-admin-api:
    build: .
    command: ["--role", "admin-api"]
    env_file: .env
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - REDIS_URL=redis://redis:6379/
    ports:
      - 8082:8082
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  logger-ai-tag-projection:
    build: .
    command: ["--role", "ai-tag-projection"]
    env_file: .env
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - CLICKHOUSE_URL=http://clickhouse:8123
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
