input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-raw
    consumer_group: "logrider_ingest"

pipeline:
  processors:
    - mapping: |
        root = this
        # Ensure a timestamp is present
        root.Timestamp = this.Timestamp | now()
        # Normalize log level to uppercase
        root.Log_Level = (this.Log_Level | "INFO").uppercase()
        # Ensure application name
        root.Application_Name = this.Application_Name | "unknown"
        # Ensure message body exists
        root.Message = this.Message | ""
        root.Trace_ID = this.Trace_ID | uuid_v4()

output:
  broker:
    pattern: fan_out
    outputs:
      - kafka:
          addresses:
            - redpanda:29092
          topic: logs-ingested
      - redis_pubsub:
          url: redis://redis:6379
          channel: ws-logs
