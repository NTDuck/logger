input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-ingested
    consumer_group: "logrider_persist"

output:
  sql_insert:
    driver: clickhouse
    dsn: clickhouse://default:password@clickhouse:9000/logrider
    table: logs
    columns:
      - Application_Name
      - Log_Level
      - Message
      - Timestamp
      - Trace_ID
    args_mapping: |
      root = [
        this.Application_Name,
        this.Log_Level,
        this.Message,
        this.Timestamp,
        this.Trace_ID
      ]
    batching:
      count: 1000
      period: 1s
